<!DOCTYPE html>
<html>
<head>
    <title>Atlantic Storm Chart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: white;
            font-family: 'Times New Roman', serif;
            margin: 20px;
        }
        h1 {
            font-weight: bold;
            font-size: 24px;
        }
    </style>
</head>
<body>

<h1>First A Storm of the Year from 2000-2026</h1>

<div style="position: relative; width: 100%; height: 520px;">
    <canvas id="stormChart"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const storms = [
  { year: 2000, name: 'Alberto', month: 8, day: 3 },
  { year: 2001, name: 'Allison', month: 6, day: 5 },
  { year: 2002, name: 'Arthur', month: 7, day: 14 },
  { year: 2003, name: 'Ana', month: 4, day: 20 },
  { year: 2004, name: 'Alex', month: 7, day: 31 },
  { year: 2005, name: 'Arlene', month: 6, day: 8 },
  { year: 2006, name: 'Alberto', month: 6, day: 10 },
  { year: 2007, name: 'Andrea', month: 5, day: 9 },
  { year: 2008, name: 'Arthur', month: 5, day: 31 },
  { year: 2009, name: 'Ana', month: 8, day: 15 },
  { year: 2010, name: 'Alex', month: 6, day: 25 },
  { year: 2011, name: 'Arlene', month: 6, day: 28 },
  { year: 2012, name: 'Alberto', month: 5, day: 19 },
  { year: 2013, name: 'Andrea', month: 6, day: 5 },
  { year: 2014, name: 'Arthur', month: 7, day: 1 },
  { year: 2015, name: 'Ana', month: 5, day: 8 },
  { year: 2016, name: 'Alex', month: 1, day: 12 },
  { year: 2017, name: 'Arlene', month: 4, day: 19 },
  { year: 2018, name: 'Alberto', month: 5, day: 25 },
  { year: 2019, name: 'Andrea', month: 5, day: 20 },
  { year: 2020, name: 'Arthur', month: 5, day: 16 },
  { year: 2021, name: 'Ana', month: 5, day: 22 },
  { year: 2022, name: 'Alex', month: 6, day: 5 },
  { year: 2023, name: 'Arlene', month: 6, day: 1 },
  { year: 2024, name: 'Alberto', month: 6, day: 19 },
  { year: 2025, name: 'Andrea', month: 6, day: 23 },
  { year: 2026, name: 'Arthur', month: 6, day: 17 },
];

function dayOfYear(month, day) {
  const days = [0,31,59,90,120,151,181,212,243,273,304,334];
  return days[month - 1] + day;
}

const avgDOY = dayOfYear(6, 20);

const labels = storms.map(s => s.year);
const dataPoints = storms.map(s => dayOfYear(s.month, s.day));

function doyToLabel(doy) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const cumDays = [0,31,59,90,120,151,181,212,243,273,304,334,365];
  let m = 0;
  while (m < 12 && doy > cumDays[m+1]) m++;
  const d = doy - cumDays[m];
  return months[m] + ' ' + d;
}

const ctx = document.getElementById('stormChart').getContext('2d');

new Chart(ctx, {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: 'First storm date',
        data: storms.map((s, i) => ({ x: s.year, y: dataPoints[i], name: s.name })),
        backgroundColor: dataPoints.map(d => d <= avgDOY ? '#378ADD' : '#E24B4A'),
        pointRadius: 7,
        pointHoverRadius: 9,
      },
      {
        label: 'Average (Jun 20)',
        data: [{ x: 1999.5, y: avgDOY }, { x: 2026.5, y: avgDOY }],
        type: 'line',
        borderColor: '#E24B4A',
        borderWidth: 1.5,
        borderDash: [6, 4],
        pointRadius: 0,
        fill: false,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: (items) => {
            const raw = items[0].raw;
            return raw.x ? String(raw.x) : '';
          },
          label: (item) => {
            const raw = item.raw;
            if (!raw.name) return 'Avg: Jun 20';
            return raw.name + ' — ' + doyToLabel(raw.y);
          }
        }
      }
    },
    scales: {
      x: {
        type: 'linear',
        min: 1999.5,
        max: 2026.5,
        ticks: {
          stepSize: 1,
          callback: v => Number.isInteger(v) ? v : '',
          maxRotation: 45,
          autoSkip: false,
          font: { size: 11 }
        },
        grid: { color: 'rgba(128,128,128,0.1)' },
        title: { display: false }
      },
      y: {
        min: 1,
        max: 240,
        ticks: {
          callback: v => doyToLabel(v),
          stepSize: 14,
          font: { size: 11 }
        },
        grid: { color: 'rgba(128,128,128,0.1)' },
        reverse: false
      }
    }
  }
});
</script>

</body>
</html>
